# hyprland.conf
# Theme: Dune - Omarchy
# By: OldJobobo (https://github.com/OldJobobo)
# Version: 1.0.0
# Description: Dune-inspired theme
# Last Updated: 2026-03-17
#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf

# Paul's Vision gradient: yellow -> orange -> red-orange -> teal
$activeBorderColor = rgba(f2e85cff) rgba(f28a2eff) rgba(d94b18ff) rgba(1f4e5bff)

# Border gradient animation - plays once on window focus
# sandwalk bezier: slow start, smooth easing like walking through sand
animations {
    bezier = sandwalk, 0.35, 0, 0.65, 1
    animation = borderangle, 1, 42, sandwalk, once
}

# General window appearance
general {
    col.active_border = $activeBorderColor
}

# Group tab appearance
group {
    col.border_active = $activeBorderColor
}

# Window decorations (blur, shadows, etc)
decoration {
    blur {
        enabled = true
        noise = 0.35
        special = false
    }
}

