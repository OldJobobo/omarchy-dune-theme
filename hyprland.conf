# hyprland.conf
# Theme: Dune - Omarchy
# By: OldJobobo (https://github.com/OldJobobo)
# Version: 1.0.0
# Description: Dune-inspired theme
# Last Updated: 2026-03-17
#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf

# Imperial spice gradient: restrained ember -> spice orange
$activeBorderColor = rgba(c86a24ff) rgba(e08a2eff) rgba(8e2f22ff)
$inactiveBorderColor = rgba(3a2a20dd)

# Border gradient animation - deliberate and heavy, like a sealed door engaging
animations {
    bezier = sandwalk, 0.35, 0, 0.65, 1
    animation = borderangle, 1, 28, sandwalk, once
}

# General window appearance
general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 3
    gaps_in = 6
    gaps_out = 12
}

# Group tab appearance
group {
    col.border_active = $activeBorderColor
}

# Window decorations (blur, shadows, etc)
decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.97

    blur {
        enabled = true
        size = 3
        passes = 2
        noise = 0.18
        special = false
    }

    shadow {
        enabled = true
        range = 14
        render_power = 3
        color = rgba(00000088)
    }
}

